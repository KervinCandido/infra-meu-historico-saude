_format_version: "3.0"

services:
  - name: service-keycloak
    url: https://keycloak-service:8443
    routes:
      - name: rota-keycloak
        paths: [/realms]
        strip_path: false
  - name: service-patient-document
    url: https://patient-document-service:8443
    routes:
      - name: rota-patient-document
        paths: [/patients, /documents]
        strip_path: false

