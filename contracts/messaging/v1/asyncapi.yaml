asyncapi: 3.1.0

id: urn:meu-historico-saude:messaging:v1

info:
  title: Meu Histórico Saúde - Contrato de Mensageria
  version: 1.0.0
  description: |
    Contrato das mensagens Kafka trocadas entre o Patient Document
    Service e o Med Text Analytics Processor.

    Uma solicitação de processamento gera exatamente uma resposta
    terminal agregada: conclusão ou falha.

defaultContentType: application/json

servers:
  localKafka:
    host: apache-kafka-broker-service:29092
    protocol: kafka
    description: Broker Kafka interno do ambiente Docker local.

channels:
  documentProcessingRequested:
    address: document-processing-requested
    title: Solicitações de processamento
    description: |
      Recebe solicitações para processamento assíncrono de documentos
      de saúde.
    servers:
      - $ref: '#/servers/localKafka'
    messages:
      documentProcessingRequestedV1:
        $ref: '#/components/messages/documentProcessingRequestedV1'
    x-producer: patient-document-service
    x-consumer: med-text-analytics-processor

  documentProcessingResult:
    address: document-processing-result
    title: Resultados terminais de processamento
    description: |
      Recebe uma única resposta terminal agregada para cada solicitação.
      A resposta comunica conclusão ou falha do processamento.
    servers:
      - $ref: '#/servers/localKafka'
    messages:
      documentProcessingResultV1:
        $ref: '#/components/messages/documentProcessingResultV1'
    x-producer: med-text-analytics-processor
    x-consumer: patient-document-service

operations:
  publishDocumentProcessingRequested:
    action: send
    channel:
      $ref: '#/channels/documentProcessingRequested'
    summary: Publica uma solicitação de processamento.
    messages:
      - $ref: '#/channels/documentProcessingRequested/messages/documentProcessingRequestedV1'
    x-application: patient-document-service

  consumeDocumentProcessingRequested:
    action: receive
    channel:
      $ref: '#/channels/documentProcessingRequested'
    summary: Consome uma solicitação de processamento.
    messages:
      - $ref: '#/channels/documentProcessingRequested/messages/documentProcessingRequestedV1'
    x-application: med-text-analytics-processor

  publishDocumentProcessingResult:
    action: send
    channel:
      $ref: '#/channels/documentProcessingResult'
    summary: Publica a resposta terminal agregada.
    messages:
      - $ref: '#/channels/documentProcessingResult/messages/documentProcessingResultV1'
    x-application: med-text-analytics-processor

  consumeDocumentProcessingResult:
    action: receive
    channel:
      $ref: '#/channels/documentProcessingResult'
    summary: Consome a resposta terminal agregada.
    messages:
      - $ref: '#/channels/documentProcessingResult/messages/documentProcessingResultV1'
    x-application: patient-document-service

components:
  messages:
    documentProcessingRequestedV1:
      name: DocumentProcessingRequestedV1
      title: Document Processing Requested
      summary: Solicita o processamento de um documento de saúde.
      contentType: application/json
      correlationId:
        description: |
          Identificador que inicia a correlação do processamento.
        location: '$message.payload#/eventId'
      payload:
        schemaFormat: 'application/schema+json;version=draft-07'
        schema:
          $ref: './schemas/document-processing-requested.schema.json'
      tags:
        - name: processing
        - name: request
      x-example-file: './examples/document-processing-requested.json'

    documentProcessingResultV1:
      name: DocumentProcessingResultV1
      title: Document Processing Result
      summary: |
        Comunica a conclusão agregada ou a falha terminal do
        processamento.
      contentType: application/json
      correlationId:
        description: |
          Identificador da solicitação que originou esta resposta.
        location: '$message.payload#/correlationId'
      payload:
        schemaFormat: 'application/schema+json;version=draft-07'
        schema:
          $ref: './schemas/document-processing-result.schema.json'
      tags:
        - name: processing
        - name: result
      x-completed-example-file: './examples/document-processing-completed.json'
      x-failed-example-file: './examples/document-processing-failed.json'